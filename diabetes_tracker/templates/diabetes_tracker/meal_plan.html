<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Plan - Diabetes Health Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }
        
        .form-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        
        .form-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .date-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        
        .date-nav a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .date-nav a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .form-body {
            padding: 30px;
        }
        
        .meal-group {
            margin-bottom: 25px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .meal-group:hover {
            transform: translateX(5px);
            background: #f0f2f5;
        }
        
        .meal-group label {
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #333;
        }
        
        .meal-group label i {
            font-size: 1.5rem;
            margin-right: 10px;
        }
        
        .meal-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }
        
        .meal-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .calorie-info {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #667eea;
            font-weight: 500;
        }
        
        .total-calories {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }
        
        .total-calories h3 {
            font-size: 1.8rem;
            margin-top: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-submit {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-cancel {
            flex: 1;
            background: #f5f5f5;
            color: #666;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .form-header h1 {
                font-size: 1.5rem;
            }
            
            .meal-group {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/diet-planner/" class="back-btn">← Back to Diet Planner</a>
        
        <div class="form-card">
            <div class="form-header">
                <h1>📅 Meal Plan</h1>
                <div class="date-nav">
                    <a href="/meal-plan/{{ selected_date|date:'Y-m-d'|add:'-1' }}/">← Previous Day</a>
                    <span style="font-size: 1.2rem;">{{ selected_date|date:"l, F j, Y" }}</span>
                    <a href="/meal-plan/{{ selected_date|date:'Y-m-d'|add:'1' }}/">Next Day →</a>
                </div>
            </div>
            
            <div class="form-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="meal-group">
                        <label><i>🌅</i> Breakfast</label>
                        {{ form.breakfast }}
                        <div class="calorie-info" id="breakfast-calories"></div>
                    </div>
                    
                    <div class="meal-group">
                        <label><i>☀️</i> Lunch</label>
                        {{ form.lunch }}
                        <div class="calorie-info" id="lunch-calories"></div>
                    </div>
                    
                    <div class="meal-group">
                        <label><i>🌙</i> Dinner</label>
                        {{ form.dinner }}
                        <div class="calorie-info" id="dinner-calories"></div>
                    </div>
                    
                    <div class="meal-group">
                        <label><i>🍎</i> Snacks</label>
                        {{ form.snacks }}
                        <div class="calorie-info" id="snacks-calories"></div>
                    </div>
                    
                    <div class="total-calories">
                        <p>Total Calories for the Day</p>
                        <h3 id="total-calories-display">{{ meal_plan.total_calories }} kcal</h3>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" class="btn-submit">💾 Save Meal Plan</button>
                        <a href="/diet-planner/" class="btn-cancel">✗ Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // Get all meal options with their calories
        const mealOptions = {
            {% for suggestion in all_suggestions %}
                "{{ suggestion.id }}": { name: "{{ suggestion.name }}", calories: {{ suggestion.calories }} },
            {% endfor %}
        };
        
        function updateCalories() {
            let total = 0;
            
            // Update breakfast calories
            const breakfastSelect = document.getElementById('id_breakfast');
            const breakfastId = breakfastSelect.value;
            if (breakfastId && mealOptions[breakfastId]) {
                const breakfastCal = mealOptions[breakfastId].calories;
                document.getElementById('breakfast-calories').innerHTML = `🔥 ${breakfastCal} calories`;
                total += breakfastCal;
            } else {
                document.getElementById('breakfast-calories').innerHTML = '';
            }
            
            // Update lunch calories
            const lunchSelect = document.getElementById('id_lunch');
            const lunchId = lunchSelect.value;
            if (lunchId && mealOptions[lunchId]) {
                const lunchCal = mealOptions[lunchId].calories;
                document.getElementById('lunch-calories').innerHTML = `🔥 ${lunchCal} calories`;
                total += lunchCal;
            } else {
                document.getElementById('lunch-calories').innerHTML = '';
            }
            
            // Update dinner calories
            const dinnerSelect = document.getElementById('id_dinner');
            const dinnerId = dinnerSelect.value;
            if (dinnerId && mealOptions[dinnerId]) {
                const dinnerCal = mealOptions[dinnerId].calories;
                document.getElementById('dinner-calories').innerHTML = `🔥 ${dinnerCal} calories`;
                total += dinnerCal;
            } else {
                document.getElementById('dinner-calories').innerHTML = '';
            }
            
            // Update snacks calories
            const snacksSelect = document.getElementById('id_snacks');
            const snacksId = snacksSelect.value;
            if (snacksId && mealOptions[snacksId]) {
                const snacksCal = mealOptions[snacksId].calories;
                document.getElementById('snacks-calories').innerHTML = `🔥 ${snacksCal} calories`;
                total += snacksCal;
            } else {
                document.getElementById('snacks-calories').innerHTML = '';
            }
            
            // Update total display
            document.getElementById('total-calories-display').innerHTML = total + ' kcal';
        }
        
        // Add event listeners
        document.getElementById('id_breakfast').addEventListener('change', updateCalories);
        document.getElementById('id_lunch').addEventListener('change', updateCalories);
        document.getElementById('id_dinner').addEventListener('change', updateCalories);
        document.getElementById('id_snacks').addEventListener('change', updateCalories);
        
        // Initial update
        updateCalories();
    </script>
</body>
</html>
