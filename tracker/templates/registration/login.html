<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diabetes Health Tracker</title>
    <style>
        /* Copy the same styles from signup page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 450px;
            padding: 40px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #ffebee;
            color: #f44336;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        /* Popup styles (same as signup) */
        .popup {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 20px;
            min-width: 300px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .popup.success {
            border-left: 4px solid #4caf50;
        }

        .popup.error {
            border-left: 4px solid #f44336;
        }

        .popup-content {
            display: flex;
            align-items: center;
        }

        .popup-icon {
            margin-right: 15px;
            font-size: 24px;
        }

        .popup-message {
            flex: 1;
            font-size: 14px;
            color: #333;
        }

        .popup-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            margin-left: 10px;
        }

        .popup-close:hover {
            color: #333;
        }

        .popup-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: progress 3s linear;
        }

        @keyframes progress {
            from {
                width: 100%;
            }
            to {
                width: 0%;
            }
        }
    </style>
</head>
<body>
    <div class="popup" id="popup">
        <div class="popup-content">
            <span class="popup-icon" id="popupIcon"></span>
            <span class="popup-message" id="popupMessage"></span>
            <button class="popup-close" onclick="closePopup()">&times;</button>
        </div>
        <div class="popup-progress" id="popupProgress"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📊 Diabetes Health Tracker</h1>
            <p>Welcome back! Please login to continue</p>
        </div>

        {% if error_message %}
        <div class="error-message">
            {{ error_message }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="/signup/">Create one here</a>
        </div>
    </div>

    <script>
        // Popup functions
        function showPopup(message, type) {
            const popup = document.getElementById('popup');
            const icon = document.getElementById('popupIcon');
            const messageEl = document.getElementById('popupMessage');
            const progress = document.getElementById('popupProgress');

            popup.className = 'popup ' + type;
            
            if (type === 'success') {
                icon.innerHTML = '✅';
            } else {
                icon.innerHTML = '❌';
            }
            
            messageEl.textContent = message;
            popup.style.display = 'block';

            // Auto close after 3 seconds
            setTimeout(closePopup, 3000);
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }

        // Show error message as popup if exists
        {% if error_message %}
            window.onload = function() {
                showPopup('{{ error_message }}', 'error');
            }
        {% endif %}
    </script>
</body>
</html>
