<!DOCTYPE html>
<html>
<head>
<title>AI Diabetes Prediction</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#74ebd5,#9face6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:420px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#4CAF50;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f3f3f3;
    border-radius:5px;
}

ul{
    padding-left:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Diabetes Prediction</h2>

<form method="POST">
{% csrf_token %}

<input type="number" name="pregnancies" placeholder="Pregnancies (Eg: 1)">

<input type="number" name="glucose" placeholder="Glucose Level (Eg: 120)">

<input type="number" name="bloodpressure" placeholder="Blood Pressure (Eg: 70)">

<input type="number" name="skinthickness" placeholder="Skin Thickness (Eg: 20)">

<input type="number" name="insulin" placeholder="Insulin (Eg: 80)">

<input type="number" step="any" name="bmi" placeholder="BMI (Eg: 25.3)">

<input type="number" step="any" name="dpf" placeholder="Diabetes Pedigree Function (Eg: 0.5)">

<input type="number" name="age" placeholder="Age (Eg: 35)">

<button type="submit">Predict</button>

</form>

{% if result %}

<div class="result">

<h3>Prediction Result: {{ result }}</h3>

<h4>Recommendations:</h4>

<ul>
{% for item in recommendation %}
<li>{{ item }}</li>
{% endfor %}
</ul>

</div>

{% endif %}

</div>

</body>
</html>
