<h2>Add Glucose Record</h2>

<form method="POST">
    {% csrf_token %}
    <input type="number" name="blood_sugar" placeholder="Blood Sugar" required><br><br>
    <input type="text" name="meal" placeholder="Meal" required><br><br>
    <input type="text" name="medication" placeholder="Medication" required><br><br>
    <input type="text" name="exercise" placeholder="Exercise" required><br><br>
    <button type="submit">Save</button>
</form>
