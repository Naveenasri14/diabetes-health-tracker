<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Health Assistant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Container */
.container{
    background:white;
    width:500px;
    max-width:95%;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    height:600px; /* slightly reduced */
}

/* Header */
.header{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
 padding:12px 15px 8px;
text-align:center;
}

.header h2{
font-size:18px;
}

.status{
font-size:12px;
opacity:0.8;
}

/* Chatbox */
.chatbox{
flex:1;
overflow-y:auto;
padding:10px;
background:#f8f9fc;
scroll-behavior:smooth;
}

/* Message */
.message{
margin:10px 0;
padding:12px 15px;
border-radius:15px;
max-width:75%;
font-size:14px;
line-height:1.5;
animation:fadeIn 0.3s ease-in;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* User message */
.user{
background:#667eea;
color:white;
margin-left:auto;
border-bottom-right-radius:5px;
}

/* Bot message */
.bot{
background:#e5e7ff;
color:#333;
border-bottom-left-radius:5px;
}

/* Input area */
.input-area{
display:flex;
padding:10px;
border-top:1px solid #eee;
background:white;
}

input{
flex:1;
padding:12px;
border-radius:20px;
border:1px solid #ccc;
font-size:14px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#667eea;
}

/* Button */
button{
margin-left:10px;
padding:10px 16px;
background:#4caf50;
border:none;
color:white;
font-size:14px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#43a047;
transform:scale(1.05);
}

/* Typing indicator */
.typing{
font-size:12px;
color:#888;
margin:2px 15px 5px;
font-style:italic;
}

</style>

</head>

<body>

<div class="container">

<!-- Header -->
<div class="header">
<h2>🤖 AI Health Assistant</h2>
<p class="status">🟢 Online • Ask about diabetes & health</p>
</div>

<!-- Chat -->
<div id="chatbox" class="chatbox"></div>

<div class="typing" id="typing" style="display:none;">Bot is typing...</div>

<!-- Input -->
<div class="input-area">
<input id="msg" placeholder="Type your question..." onkeypress="handleKey(event)">
<button onclick="send()">Send</button>
</div>

</div>

<script>

function addMessage(text,type){
let chatbox=document.getElementById("chatbox");

let msg=document.createElement("div");
msg.classList.add("message",type);
msg.innerText=text;

chatbox.appendChild(msg);
chatbox.scrollTop=chatbox.scrollHeight;
}

function showTyping(){
document.getElementById("typing").style.display="block";
}

function hideTyping(){
document.getElementById("typing").style.display="none";
}

function send(){
let message=document.getElementById("msg").value;

if(message.trim()==="") return;

addMessage(message,"user");
document.getElementById("msg").value="";

showTyping();

fetch("/chatbot/",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"message="+encodeURIComponent(message)
})
.then(response=>response.json())
.then(data=>{
hideTyping();
addMessage(data.response,"bot");
})
.catch(()=>{
hideTyping();
addMessage("⚠️ Error contacting AI service.","bot");
});
}

/* Enter key support */
function handleKey(e){
if(e.key==="Enter"){
send();
}
}

</script>

</body>
</html>
