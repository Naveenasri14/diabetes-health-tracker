<!DOCTYPE html>
<html>
<head>
    <title>🔔 ALARM REMINDER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: rgba(0, 0, 0, 0.8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: bgPulse 1s infinite;
        }

        @keyframes bgPulse {
            0% { background: rgba(0, 0, 0, 0.8); }
            50% { background: rgba(255, 0, 0, 0.3); }
            100% { background: rgba(0, 0, 0, 0.8); }
        }

        .alarm-container {
            max-width: 500px;
            width: 90%;
            animation: slideIn 0.5s, shake 0.5s infinite;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-100vh);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .alarm-card {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff0000 100%);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(255, 0, 0, 0.5);
            border: 4px solid #ffd700;
            text-align: center;
        }

        .alarm-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: ring 1s infinite;
        }

        @keyframes ring {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-15deg); }
            30% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            50% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        .alarm-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .alarm-time {
            font-size: 72px;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .alarm-message {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .alarm-message p {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }

        .alarm-message small {
            color: #ffd700;
            font-size: 18px;
        }

        .alarm-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-dismiss {
            flex: 1;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px;
            border: 2px solid white;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-dismiss:hover {
            background: white;
            color: #ff0000;
            transform: scale(1.05);
        }

        .btn-snooze {
            flex: 1;
            background: #ffd700;
            color: #ff0000;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-snooze:hover {
            background: #ffed4a;
            transform: scale(1.05);
        }

        .countdown {
            color: white;
            font-size: 16px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .alarm-title {
                font-size: 36px;
            }
            .alarm-time {
                font-size: 48px;
            }
            .alarm-message p {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="alarm-container">
        <div class="alarm-card">
            <div class="alarm-icon">⏰</div>
            <div class="alarm-title">🔔 ALARM!</div>
            <div class="alarm-time" id="currentTime"></div>
            
            <div class="alarm-message">
                <p>{{ reminder.title }}</p>
                <small>{{ reminder.description }}</small>
                {% if reminder.test_condition %}
                <br><small>Type: {{ reminder.get_test_condition_display }}</small>
                {% endif %}
            </div>

            <audio id="alarmSound" loop autoplay>
                <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <div class="alarm-buttons">
                <form method="POST" action="{% url 'dismiss_alarm' reminder.id %}" style="flex: 1;">
                    {% csrf_token %}
                    <button type="submit" class="btn-dismiss">🔇 DISMISS</button>
                </form>
                <form method="POST" action="{% url 'snooze_alarm' reminder.id %}" style="flex: 1;">
                    {% csrf_token %}
                    <button type="submit" class="btn-snooze">⏰ SNOOZE (5 min)</button>
                </form>
            </div>

            <div class="countdown" id="countdown"></div>
        </div>
    </div>

    <script>
        // Play alarm sound with fallback for browser autoplay policies
        const alarmSound = document.getElementById('alarmSound');
        
        function playAlarm() {
            alarmSound.volume = 0.8;
            alarmSound.play().catch(e => {
                console.log('Autoplay blocked, waiting for user interaction');
                // If autoplay blocked, play on first click anywhere
                document.body.addEventListener('click', function() {
                    alarmSound.play();
                }, { once: true });
            });
        }
        
        // Try to play immediately
        playAlarm();

        // Update current time
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Countdown to auto-dismiss (5 minutes)
        let secondsLeft = 300; // 5 minutes
        const countdownEl = document.getElementById('countdown');

        function updateCountdown() {
            const minutes = Math.floor(secondsLeft / 60);
            const seconds = secondsLeft % 60;
            countdownEl.textContent = `Auto-dismiss in: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            if (secondsLeft <= 0) {
                window.location.href = "{% url 'dashboard' %}";
            }
            secondsLeft--;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Prevent user from leaving without dismissing
        window.onbeforeunload = function() {
            return "Alarm is still active! Please dismiss or snooze.";
        };
    </script>
</body>
</html>
